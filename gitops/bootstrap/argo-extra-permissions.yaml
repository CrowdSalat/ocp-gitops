---
# 1. PERMISSIONS FOR LVM STORAGE (Namespaced)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-lvm-manager
  namespace: openshift-lvm-storage
rules:
- apiGroups: ["lvm.topolvm.io"]
  resources: ["lvmclusters"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-lvm-manager-binding
  namespace: openshift-lvm-storage
subjects:
- kind: ServiceAccount
  name: openshift-gitops-argocd-application-controller
  namespace: openshift-gitops
roleRef:
  kind: Role
  name: argocd-lvm-manager
  apiGroup: rbac.authorization.k8s.io

---
# 2. PERMISSIONS FOR EXTERNAL SECRETS OPERATOR (Cluster-Scoped)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-external-secrets-manager
rules:
- apiGroups: ["external-secrets.io"]
  resources: ["clustersecretstores", "clusterexternalsecrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-external-secrets-manager-binding
subjects:
- kind: ServiceAccount
  name: openshift-gitops-argocd-application-controller
  namespace: openshift-gitops
roleRef:
  kind: ClusterRole
  name: argocd-external-secrets-manager
  apiGroup: rbac.authorization.k8s.io

---
# 3. PERMISSIONS FOR EXTERNAL SECRETS IN cert-manager (Namespaced)
# TODO: investigate whether this is still needed if the namespace gets the ArgoCD
#       managed-by label (argocd.argoproj.io/managed-by: openshift-gitops), which
#       grants the application controller admin rights automatically.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-external-secrets-manager
  namespace: cert-manager
rules:
- apiGroups: ["external-secrets.io"]
  resources: ["externalsecrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-external-secrets-manager-binding
  namespace: cert-manager
subjects:
- kind: ServiceAccount
  name: openshift-gitops-argocd-application-controller
  namespace: openshift-gitops
roleRef:
  kind: Role
  name: argocd-external-secrets-manager
  apiGroup: rbac.authorization.k8s.io

---
# 4. PERMISSIONS FOR CERT-MANAGER (Cluster-Scoped)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-cert-manager-manager
rules:
- apiGroups: ["cert-manager.io"]
  resources: ["clusterissuers"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-cert-manager-manager-binding
subjects:
- kind: ServiceAccount
  name: openshift-gitops-argocd-application-controller
  namespace: openshift-gitops
roleRef:
  kind: ClusterRole
  name: argocd-cert-manager-manager
  apiGroup: rbac.authorization.k8s.io

---
# 5. PERMISSIONS FOR CERT-MANAGER CERTIFICATES IN openshift-ingress (Namespaced)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-cert-manager-manager
  namespace: openshift-ingress
rules:
- apiGroups: ["cert-manager.io"]
  resources: ["certificates"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-cert-manager-manager-binding
  namespace: openshift-ingress
subjects:
- kind: ServiceAccount
  name: openshift-gitops-argocd-application-controller
  namespace: openshift-gitops
roleRef:
  kind: Role
  name: argocd-cert-manager-manager
  apiGroup: rbac.authorization.k8s.io

---
# 6. PERMISSIONS FOR METALLB (Namespaced)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-metallb-manager
  namespace: metallb-system
rules:
- apiGroups: ["metallb.io"]
  resources: ["metallbs", "ipaddresspools", "l2advertisements"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-metallb-manager-binding
  namespace: metallb-system
subjects:
- kind: ServiceAccount
  name: openshift-gitops-argocd-application-controller
  namespace: openshift-gitops
roleRef:
  kind: Role
  name: argocd-metallb-manager
  apiGroup: rbac.authorization.k8s.io

---
# 7. PERMISSIONS FOR GATEWAY API (Cluster-Scoped)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-gateway-manager
rules:
- apiGroups: ["gateway.networking.k8s.io"]
  resources: ["gatewayclasses"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-gateway-manager-binding
subjects:
- kind: ServiceAccount
  name: openshift-gitops-argocd-application-controller
  namespace: openshift-gitops
roleRef:
  kind: ClusterRole
  name: argocd-gateway-manager
  apiGroup: rbac.authorization.k8s.io
