apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra
  namespace: openshift-gitops
spec:
  project: cluster-admin-project
  source:
    repoURL: https://github.com/CrowdSalat/ocp-gitops.git
    targetRevision: HEAD
    path: gitops/infra
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
