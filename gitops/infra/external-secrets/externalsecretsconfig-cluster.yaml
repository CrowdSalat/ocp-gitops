# Docs: https://docs.redhat.com/en/documentation/openshift_container_platform/4.19/html/security_and_compliance/external-secrets-operator-for-red-hat-openshift
apiVersion: operator.openshift.io/v1alpha1
kind: ExternalSecretsConfig
metadata:
  name: cluster
spec:
  controllerConfig:
    networkPolicies:
    - name: allow-external-secrets-egress
      componentName: ExternalSecretsCoreController
      egress:
      - ports:
        - port: 443
          protocol: TCP
