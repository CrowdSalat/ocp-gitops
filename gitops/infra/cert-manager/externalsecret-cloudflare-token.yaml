apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  # cert-manager's ClusterIssuer references secrets from this namespace.
  namespace: openshift-cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: cloudflare-api-token
    creationPolicy: Owner
  data:
  - secretKey: api-token
    remoteRef:
      # Infisical secret name. Run bootstrap-cloudflare-token.sh to create it.
      key: CLOUDFLARE_API_TOKEN
      # Folder path inside the project — matches where the bootstrap script saves it.
      secretsPath: /cert-manager
