apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  # cert-manager's ClusterIssuer references secrets from this namespace.
  namespace: openshift-cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: cloudflare-api-token
    creationPolicy: Owner
  data:
  - secretKey: api-token
    remoteRef:
      # Infisical secret name inside the project/path below.
      key: CLOUDFLARE_API_TOKEN
      # TODO: set your Infisical project ID (Settings → Project ID in the UI).
      projectId: REPLACE_WITH_INFISICAL_PROJECT_ID
      # TODO: set the environment slug (e.g. prod, dev, staging).
      environmentSlug: prod
      # TODO: set the folder path where the secret lives (/ = root).
      secretsPath: /cert-manager
