apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: app-openclaw
  labels:
    app: openclaw
data:
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "bind": "lan",
        "port": 18789,
        "auth": {
          "mode": "token"
        },
        "trustedProxies": ["10.128.0.0/14"],
        "controlUi": {
          "enabled": true,
          "allowedOrigins": ["https://openclaw.apps.ocp.jharings.de"]
        }
      },
      "models": {
        "mode": "merge",
        "providers": {
          "ollama": {
            "baseUrl": "http://ollama.app-ollama.svc.cluster.local:11434/v1",
            "api": "openai-completions",
            "injectNumCtxForOpenAICompat": true,
            "request": {
              "allowPrivateNetwork": true
            },
            "models": [
              {
                "id": "gemma4:e2b",
                "name": "Gemma 4 E2B (local)",
                "input": ["text"],
                "reasoning": false,
                "cost": { "input": 0, "output": 0, "cacheRead": 0, "cacheWrite": 0 },
                "contextWindow": 16384,
                "contextTokens": 12288,
                "maxTokens": 1024
              }
            ]
          }
        }
      },
      "agents": {
        "defaults": {
          "workspace": "~/.openclaw/workspace",
          "model": {
            "primary": "ollama/gemma4:e2b"
          }
        },
        "list": [
          {
            "id": "default",
            "name": "OpenClaw Assistant",
            "workspace": "~/.openclaw/workspace"
          }
        ]
      },
      "cron": { "enabled": false }
    }
  AGENTS.md: |
    # OpenClaw Assistant

    You are a helpful AI assistant running on a self-hosted OpenShift cluster.

    Before proposing or building a custom system, feature, workflow, tool,
    integration, or automation, do a brief check for open-source projects,
    maintained libraries, existing OpenClaw plugins, or free platforms that
    already solve it well enough. Prefer those when adequate. Build custom only
    when existing options are unsuitable, too expensive, unmaintained, unsafe,
    non-compliant, or the user explicitly asks for custom.
