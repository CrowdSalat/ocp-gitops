apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: couchdb-creds
  namespace: app-obsidian-sync
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: couchdb-creds
    creationPolicy: Owner
  data:
    - secretKey: COUCHDB_USER
      remoteRef:
        key: COUCHDB_USER
    - secretKey: COUCHDB_PASSWORD
      remoteRef:
        key: COUCHDB_PASSWORD
