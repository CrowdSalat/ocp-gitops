apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: couchdb
  namespace: app-obsidian-sync
spec:
  serviceName: couchdb
  replicas: 1
  selector:
    matchLabels:
      app: couchdb
  template:
    metadata:
      labels:
        app: couchdb
    spec:
      serviceAccountName: couchdb
      containers:
        - name: couchdb
          image: apache/couchdb:3.5.2
          ports:
            - containerPort: 5984
              name: couchdb
          env:
            - name: COUCHDB_USER
              valueFrom:
                secretKeyRef:
                  name: couchdb-creds
                  key: COUCHDB_USER
            - name: COUCHDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: couchdb-creds
                  key: COUCHDB_PASSWORD
          lifecycle:
            postStart:
              exec:
                command:
                  - "/bin/bash"
                  - "-c"
                  - |
                    # Wait for the CouchDB API to become responsive
                    until curl -s http://127.0.0.1:5984/; do
                      sleep 2
                    done

                    # Finalize single-node deployment setup
                    curl -s -X POST http://${COUCHDB_USER}:${COUCHDB_PASSWORD}@127.0.0.1:5984/_cluster_setup \
                      -H "Content-Type: application/json" \
                      -d '{"action": "finish_cluster"}'

                    # Create the target database for Obsidian LiveSync
                    curl -s -X PUT http://${COUCHDB_USER}:${COUCHDB_PASSWORD}@127.0.0.1:5984/obsidian-vault
          volumeMounts:
            - name: data
              mountPath: /opt/couchdb/data
            - name: config
              mountPath: /opt/couchdb/etc/local.d/99-livesync.ini
              subPath: 99-livesync.ini
              readOnly: true
          resources:
            limits:
              memory: 2Gi
              cpu: 1
            requests:
              memory: 1Gi
              cpu: 500m
      volumes:
        - name: config
          configMap:
            name: couchdb-livesync-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: lvms-vg1
        resources:
          requests:
            storage: 5Gi
