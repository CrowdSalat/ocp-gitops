apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: couchdb
  namespace: app-obsidian-sync
spec:
  serviceName: couchdb
  replicas: 1
  selector:
    matchLabels:
      app: couchdb
  template:
    metadata:
      labels:
        app: couchdb
    spec:
      serviceAccountName: couchdb
      initContainers:
        - name: copy-config
          image: apache/couchdb:3.5.2
          command:
            - /bin/sh
            - -c
            - cp /tmp/configmap/99-livesync.ini /opt/couchdb/etc/local.d/99-livesync.ini
          volumeMounts:
            - name: configmap-source
              mountPath: /tmp/configmap
              readOnly: true
            - name: local-d
              mountPath: /opt/couchdb/etc/local.d
      containers:
        - name: couchdb
          image: apache/couchdb:3.5.2
          ports:
            - containerPort: 5984
              name: couchdb
          env:
            - name: COUCHDB_USER
              valueFrom:
                secretKeyRef:
                  name: couchdb-creds
                  key: COUCHDB_USER
            - name: COUCHDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: couchdb-creds
                  key: COUCHDB_PASSWORD
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - curl -sf -u ${COUCHDB_USER}:${COUCHDB_PASSWORD} http://127.0.0.1:5984/_up
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - curl -sf -u ${COUCHDB_USER}:${COUCHDB_PASSWORD} http://127.0.0.1:5984/_up
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /opt/couchdb/data
            - name: local-d
              mountPath: /opt/couchdb/etc/local.d
          resources:
            limits:
              memory: 2Gi
              cpu: 1
            requests:
              memory: 1Gi
              cpu: 500m
      volumes:
        - name: configmap-source
          configMap:
            name: couchdb-livesync-config
        - name: local-d
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: lvms-vg1
        resources:
          requests:
            storage: 5Gi
