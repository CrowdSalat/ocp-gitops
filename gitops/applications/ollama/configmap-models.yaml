apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-models
  namespace: app-ollama
data:
  # Space-separated list of models to pull at pod startup via init container.
  # Ollama registry (ollama.com/library):   llama3.2:3b  gemma3:4b  qwen2.5:3b
  # HuggingFace GGUF:  hf.co/bartowski/Llama-3.2-3B-Instruct-GGUF:Q4_K_M
  # OCI artifact:      oci://registry.example.com/models/llama3:latest
  OLLAMA_PULL_MODELS: "gemma4:e4b"
