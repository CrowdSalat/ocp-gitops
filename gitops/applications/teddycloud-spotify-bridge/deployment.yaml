apiVersion: apps/v1
kind: Deployment
metadata:
  name: teddycloud-spotify-bridge
  namespace: app-teddycloud
  labels:
    app: teddycloud-spotify-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: teddycloud-spotify-bridge
  template:
    metadata:
      labels:
        app: teddycloud-spotify-bridge
    spec:
      serviceAccountName: teddycloud-spotify-bridge
      containers:
      # ── Main bridge (Quarkus) ────────────────────────────────────────────────
      - name: teddycloud-spotify-bridge
        image: docker.io/crowdsalat/teddycloud-spotify-bridge:1.0.0-SNAPSHOT
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
        env:
        # ── Event source ──────────────────────────────────────────────────────
        - name: BRIDGE_EVENT_SOURCE
          value: mqtt
        # ── MQTT ──────────────────────────────────────────────────────────────
        - name: BRIDGE_MQTT_HOST
          value: mosquitto.app-teddycloud.svc.cluster.local
        - name: BRIDGE_MQTT_PORT
          value: "1883"
        - name: MP_MESSAGING_INCOMING_TEDDYCLOUD_ENABLED
          value: "true"
        # ── Mapping file ──────────────────────────────────────────────────────
        - name: BRIDGE_MAPPINGS_FILE
          value: /deployments/config/tonie-mappings.json
        # ── Audio pipe (shared with go-librespot sidecar) ─────────────────────
        - name: BRIDGE_AUDIO_PIPE_PATH
          value: /audio/librespot.pipe
        # ── go-librespot API ──────────────────────────────────────────────────
        - name: BRIDGE_GO_LIBRESPOT_BASE_URL
          value: http://localhost:3678
        volumeMounts:
        - name: tonie-mappings
          mountPath: /deployments/config
          readOnly: true
        - name: audio-pipe
          mountPath: /audio
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
        readinessProbe:
          httpGet:
            path: /q/health/ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /q/health/live
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30

      # ── go-librespot sidecar (Spotify Connect + audio pipe) ─────────────────
      - name: go-librespot
        image: ghcr.io/devgianlu/go-librespot:v0.7.1
        # No args override: uses image default CMD which already sets --config_dir /config
        ports:
        - name: api
          containerPort: 3678
        - name: oauth-callback
          containerPort: 9090
        volumeMounts:
        - name: go-librespot-state
          mountPath: /config
        - name: go-librespot-config
          mountPath: /config/config.yml
          subPath: config.yml
        - name: audio-pipe
          mountPath: /audio
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL

      volumes:
      - name: tonie-mappings
        configMap:
          name: tonie-mappings
      - name: audio-pipe
        emptyDir: {}
      - name: go-librespot-state
        persistentVolumeClaim:
          claimName: go-librespot-state
      - name: go-librespot-config
        configMap:
          name: go-librespot-config
