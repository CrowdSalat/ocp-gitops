apiVersion: v1
kind: ConfigMap
metadata:
  name: go-librespot-config
  namespace: app-teddycloud
data:
  config.yml: |
    device_name: TeddycloudBridge
    device_type: speaker

    audio_backend: pipe
    audio_output_pipe: /audio/librespot.pipe
    audio_output_pipe_format: s16le

    bitrate: 160
    normalisation_disabled: false
    disable_autoplay: false

    zeroconf_enabled: false

    credentials:
      type: interactive
      interactive:
        callback_port: 9090

    server:
      enabled: true
      address: "0.0.0.0"
      port: 3678
      allow_origin: "*"
