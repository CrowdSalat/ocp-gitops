apiVersion: apps/v1
kind: Deployment
metadata:
  name: mealie
  labels:
    app: mealie
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: mealie
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: mealie
    spec:
      containers:
      - image: ghcr.io/mealie-recipes/mealie:v3.20.1
        imagePullPolicy: IfNotPresent
        name: mealie
        env:
          - name: BASE_URL
            value: 'https://mealie.apps.ocp.jharings.de'
          # Ollama / AI
          - name: OPENAI_BASE_URL
            value: "http://ollama.app-ollama.svc.cluster.local:11434/v1"
          - name: OPENAI_API_KEY
            value: "ollama"
          - name: OPENAI_MODEL
            value: "gemma4:e2b"
          - name: OPENAI_ENABLE_IMAGE_SERVICES
            value: "false"
          # OIDC / Zitadel
          - name: OIDC_AUTH_ENABLED
            value: "true"
          - name: OIDC_SIGNUP_ENABLED
            value: "true"
          - name: OIDC_REQUIRES_EMAIL_VERIFICATION
            value: "true"
          - name: OIDC_CONFIGURATION_URL
            value: "https://ocp-zdzhj8.eu1.zitadel.cloud/.well-known/openid-configuration"
          - name: OIDC_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: mealie-creds
                key: OIDC_CLIENT_ID
          - name: OIDC_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: mealie-creds
                key: OIDC_CLIENT_SECRET
          - name: OIDC_AUTO_REDIRECT
            value: "false"
          - name: OIDC_PROVIDER_NAME
            value: "Zitadel"
          - name: OIDC_REMEMBER_ME
            value: "false"
          - name: OIDC_SIGNING_ALGORITHM
            value: "RS256"
          - name: OIDC_USER_CLAIM
            value: "email"
          - name: OIDC_NAME_CLAIM
            value: "name"
          - name: OIDC_ADMIN_GROUP
            value: "ZITADEL_MEALIE_ADMIN_ROLE"
        volumeMounts:
          - name: mealie
            mountPath: /app/data
      restartPolicy: Always
      volumes:
        - name: mealie
          persistentVolumeClaim:
            claimName: mealie
