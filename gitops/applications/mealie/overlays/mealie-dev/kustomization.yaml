apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: app-mealie-dev
resources:
  - ../../base
  - namespace.yaml
patches:
  - path: patch-route.yaml
    target:
      kind: Route
      name: mealie
  - path: patch-deployment-env.yaml
    target:
      kind: Deployment
      name: mealie
